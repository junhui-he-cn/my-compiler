name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake
        run: cmake -S . -B build -DCOMPILER_DESIGN_ENABLE_WARNINGS=ON

      - name: Build
        run: cmake --build build

      - name: Run CTest
        run: ctest --test-dir build --output-on-failure

      - name: Run golden tests
        run: python3 tests/run_golden_tests.py ./build/compiler_design

      - name: Run boundary token tests
        run: python3 tests/run_boundary_tests.py ./build/compiler_design

      - name: Run golden runner selftest
        run: python3 tests/run_golden_tests_selftest.py

      - name: Run bytecode artifact tests
        run: python3 tests/bytecode_artifact_tests.py ./build/compiler_design vm-rs

      - name: Run Rust VM golden parity tests
        run: python3 tests/run_rust_vm_tests.py ./build/compiler_design vm-rs --goldens

      - name: Run Rust unit tests
        run: cargo test --manifest-path vm-rs/Cargo.toml

      - name: Run canonical verification inventory
        run: python3 tests/run_verification.py ./build/compiler_design vm-rs --report build/verification-report.json

      - name: Upload canonical verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verification-report
          path: build/verification-report.json

  sanitizers:
    name: Sanitizers
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure CMake with sanitizers
        run: cmake -S . -B build-sanitize -DCOMPILER_DESIGN_ENABLE_WARNINGS=ON -DCOMPILER_DESIGN_ENABLE_SANITIZERS=ON

      - name: Build with sanitizers
        run: cmake --build build-sanitize

      - name: Run CTest with sanitizers
        run: ctest --test-dir build-sanitize --output-on-failure
